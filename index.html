<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>Rep Radar — Free AI Online Reputation Checker | See What People Say About You</title>
    <meta name="title" content="Rep Radar — Free AI Online Reputation Checker" />

    <meta name="author" content="Reputation Return" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="language" content="English" />
    <meta name="theme-color" content="#2563EB" />

    <!-- Google Search Console verification -->
    <meta name="google-site-verification" content="0TIi5G9OVRH7M4iWbsIjcB5h_LplT0FUE9U8T_PbXzI" />

    <!-- Canonical -->

    <!-- Icons & Manifest -->
    <link rel="icon" type="image/png" href="/repu_logo.png" />
    <link rel="apple-touch-icon" href="/repu_logo.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.rep-radar.com/" />
    <meta property="og:title" content="Rep Radar — Free AI Online Reputation Checker" />
    <meta property="og:description" content="See what the internet says about anyone. Free AI reputation score across X, Instagram, TikTok, Facebook, LinkedIn & Google — full PDF report in 60 seconds. No signup." />
    <meta property="og:image" content="https://www.rep-radar.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Rep Radar" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:title" content="Rep Radar — Free AI Online Reputation Checker" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet" />

    <!-- Structured Data: Organization + WebApplication + FAQ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://www.rep-radar.com/#organization",
          "name": "Rep Radar",
          "url": "https://www.rep-radar.com/",
          "logo": "https://www.rep-radar.com/repu_logo.png",
          "description": "AI-powered online reputation intelligence by Reputation Return.",
          "parentOrganization": {
            "@type": "Organization",
            "name": "Reputation Return",
            "url": "https://reputationreturn.com"
          }
        },
        {
          "@type": "WebApplication",
          "@id": "https://www.rep-radar.com/#webapp",
          "name": "Rep Radar",
          "url": "https://www.rep-radar.com/",
          "applicationCategory": "BusinessApplication",
          "operatingSystem": "Web",
          "browserRequirements": "Requires JavaScript",
          "description": "Free AI online reputation checker. Scans X, Instagram, TikTok, Facebook, LinkedIn and Google to generate a reputation score, sentiment analysis, competitor benchmarks and a full PDF report.",
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD"
          }
        },
        {
          "@type": "FAQPage",
          "@id": "https://www.rep-radar.com/#faq",
          "mainEntity": [
            {
              "@type": "Question",
              "name": "Is Rep Radar really free?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Yes — completely free, no credit card, no expiring trial. Enter a name, pick your platforms, and get a full PDF reputation report."
              }
            },
            {
              "@type": "Question",
              "name": "How accurate is the reputation score?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "The score is generated by AI analysing real social media posts, comments, reviews, news coverage and web search results, blending social sentiment with web and search presence."
              }
            },
            {
              "@type": "Question",
              "name": "Do I need to create an account?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "No. You can generate and download a full report without signing up. We only ask for an email so we can send you a copy of the PDF."
              }
            },
            {
              "@type": "Question",
              "name": "Which platforms does Rep Radar scan?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "X (Twitter), Instagram, TikTok, Facebook, LinkedIn and Google Business, plus a web and search intelligence layer that pulls in news, reviews and press mentions."
              }
            },
            {
              "@type": "Question",
              "name": "How long does it take to get a reputation report?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Most reports are ready in under 60 seconds for the on-screen preview, with the full PDF generated moments after."
              }
            }
          ]
        }
      ]
    }
    </script>
  </head>
  <body style="margin:0;background:#F8F9FC;">
    <div id="root">
      <!-- App-shell loader: shown until React mounts so there is never a blank
           white screen (especially when arriving from the reputationreturn.com embed) -->
      <div id="rr-boot" style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:#F8F9FC;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
        <div style="width:48px;height:48px;border:4px solid rgba(37,99,235,0.15);border-top-color:#2563EB;border-radius:50%;animation:rrboot .8s linear infinite;"></div>
        <div style="font-size:15px;font-weight:700;color:#0F172A;">Loading Rep Radar…</div>
      </div>
      <style>@keyframes rrboot{to{transform:rotate(360deg)}}</style>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
